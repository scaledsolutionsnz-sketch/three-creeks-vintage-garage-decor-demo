<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leave a Review | Three Creeks Vintage Garage Decor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Barlow:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --dark: #0b0b0d;
    --cream: #f8f5f0;
    --accent: #c8870a;
    --accent-light: #e09b1a;
    --charcoal: #1a1a1f;
    --white: #ffffff;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Barlow', sans-serif;
    background: var(--dark);
    color: var(--white);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 20px;
  }
  .review-container {
    max-width: 600px;
    width: 100%;
    text-align: center;
  }
  .brand {
    font-family: 'Oswald', sans-serif;
    font-size: 1.1rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 48px;
    text-decoration: none;
    display: inline-block;
  }
  h1 {
    font-family: 'Oswald', sans-serif;
    font-size: clamp(2rem, 5vw, 3rem);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    margin-bottom: 16px;
  }
  p.subtitle {
    font-size: 1.02rem;
    line-height: 1.7;
    color: rgba(255,255,255,0.6);
    margin-bottom: 52px;
  }
  .stars-row {
    display: flex;
    justify-content: center;
    gap: 16px;
    margin-bottom: 16px;
  }
  .star-btn {
    background: none;
    border: none;
    cursor: pointer;
    padding: 8px;
    transition: transform 0.2s;
  }
  .star-btn:hover { transform: scale(1.15); }
  .star-btn svg {
    width: 52px;
    height: 52px;
    fill: rgba(255,255,255,0.15);
    transition: fill 0.2s;
  }
  .star-btn:hover svg,
  .star-btn.active svg { fill: var(--accent); }
  .stars-label {
    font-size: 0.88rem;
    color: rgba(255,255,255,0.4);
    margin-bottom: 48px;
    min-height: 20px;
    transition: color 0.2s;
  }
  .rating-labels { display: none; }
  .btn-primary {
    font-family: 'Oswald', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--dark);
    background: var(--accent);
    padding: 16px 48px;
    border-radius: 6px;
    text-decoration: none;
    border: none;
    cursor: pointer;
    transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
    display: inline-block;
  }
  .btn-primary:hover {
    background: var(--accent-light);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(200,135,10,0.38);
  }
  .back-link {
    display: inline-block;
    margin-top: 36px;
    font-size: 0.88rem;
    color: rgba(255,255,255,0.35);
    text-decoration: none;
    transition: color 0.2s;
    letter-spacing: 0.06em;
  }
  .back-link:hover { color: var(--accent); }
</style>
</head>
<body>
<div class="review-container">
  <a href="index.html" class="brand">Three Creeks Vintage Garage Decor</a>
  <h1>How Was Your Visit?</h1>
  <p class="subtitle">We'd love to hear what you thought of Three Creeks. Click your rating below and we'll take you from there.</p>

  <div class="stars-row" id="starsRow">
    <button class="star-btn" data-rating="1" onclick="selectRating(1)" title="1 star">
      <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
    </button>
    <button class="star-btn" data-rating="2" onclick="selectRating(2)" title="2 stars">
      <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
    </button>
    <button class="star-btn" data-rating="3" onclick="selectRating(3)" title="3 stars">
      <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
    </button>
    <button class="star-btn" data-rating="4" onclick="selectRating(4)" title="4 stars">
      <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
    </button>
    <button class="star-btn" data-rating="5" onclick="selectRating(5)" title="5 stars">
      <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
    </button>
  </div>
  <p class="stars-label" id="starsLabel">Select your rating</p>

  <a href="#" class="btn-primary" id="continueBtn" onclick="handleContinue(event)">Continue</a>
  <br>
  <a href="index.html" class="back-link">&#8592; Back to website</a>
</div>

<script>
  let selectedRating = 0;
  const labels = ['', 'Poor', 'Below Average', 'Average', 'Good', 'Excellent!'];

  function selectRating(r) {
    selectedRating = r;
    document.querySelectorAll('.star-btn').forEach((btn, i) => {
      btn.classList.toggle('active', i < r);
    });
    const label = document.getElementById('starsLabel');
    label.textContent = labels[r];
    label.style.color = r >= 4 ? 'var(--accent)' : 'rgba(255,255,255,0.5)';
  }

  function handleContinue(e) {
    e.preventDefault();
    if (!selectedRating) { alert('Please select a star rating first.'); return; }
    if (selectedRating >= 4) {
      window.location.href = 'https://g.page/r/REPLACE_WITH_GOOGLE_REVIEW_LINK';
    } else {
      window.location.href = 'private.html?rating=' + selectedRating;
    }
  }
</script>
</body>
</html>
